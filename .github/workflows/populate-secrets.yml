name: Populate AWS Secrets Reusable Workflow

on:
  workflow_call:
    inputs:
      environmentName:
        required: false
        type: string

jobs:
  populate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    # Set the GitHub Environment here (so Environment secrets resolve correctly)
    environment: ${{ inputs.environmentName || (
      github.ref_name == 'main' && 'prod'
      || github.ref_name == 'master' && 'prod'
      || github.ref_name == 'prod' && 'prod'
      || github.ref_name == 'stage' && 'stage'
      || github.ref_name == 'staging' && 'stage'
      || github.ref_name == 'develop' && 'develop'
      || github.ref_name == 'dev' && 'develop'
      || 'develop' ) }}

    strategy:
      fail-fast: false
      matrix:
        base: #Make sure these are the same as in config.ts that are then used in secrets-manager-stack
          - secrets-hydration-poc-lars-andersson

    steps:

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Compute env suffix & final secret name
        id: names
        shell: bash
        run: |
          BR="${GITHUB_REF_NAME}"
          case "$BR" in
            main|master|prod) ENV_SUFFIX="prod" ;;
            stage|staging)    ENV_SUFFIX="stage" ;;
            develop|dev)      ENV_SUFFIX="develop" ;;
            *)                ENV_SUFFIX="develop" ;;
          esac

          BASE="${{ matrix.base }}"
          case "$BASE" in
            *-develop|*-staging|*-prod) FINAL="$BASE" ;;
            *) FINAL="${BASE}-${ENV_SUFFIX}" ;;
          esac

          echo "envSuffix=$ENV_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "final=$FINAL"          >> "$GITHUB_OUTPUT"
          echo "base=$BASE"            >> "$GITHUB_OUTPUT"

      - name: Build JSON payload for ${{ steps.names.outputs.final }}
        id: payload
        shell: bash
        env: #These needs to be defined in github secrets per environment
          TYPE_OF_BEER:      ${{ secrets.TYPE_OF_BEER }}
          ABV:               ${{ secrets.ABV }}
        run: |
          set -euo pipefail
          BASE="${{ steps.names.outputs.base }}"

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          case "$BASE" in
            secrets-hydration-poc-lars-andersson)
              : "${TYPE_OF_BEER:?Missing TYPE_OF_BEER}"
              : "${ABV:?Missing ABV}"
              jq -n \
                --arg id "$TYPE_OF_BEER" \
                --arg se "$ABV" \
                '{TYPE_OF_BEER:$id, ABV:$se}' \
                > secret.json
              ;;
            *)
              echo "::error::Unknown secret base ${BASE}"
              exit 1
              ;;
          esac

      - name: Put secret value
        shell: bash
        run: |
          aws secretsmanager put-secret-value \
            --secret-id "${{ steps.names.outputs.final }}" \
            --secret-string file://secret.json \
            --no-cli-pager

      - name: Clean up secret.json
        if: always()
        run: rm -f secret.json
